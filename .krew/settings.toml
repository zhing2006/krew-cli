[settings]
approval_mode = "suggest"
reply_order = ["gpt", "doubao"]

[[agents]]
name = "gpt"
display_name = "GPT"
provider = "openai"
model = "gpt-5.2"
api_type = "responses"
color = "green"

[[agents]]
name = "doubao"
display_name = "豆包"
provider = "litellm"
model = "doubao-seed-2-0-lite"
color = "yellow"

[providers.litellm]
type = "openai"
api_key_env = "OPENAI_API_KEY"
base_url = "http://litellm.tsd.xindong.com:4000"

[providers.openai]
type = "openai"
api_key_env = "AZURE6_OPENAI_API_KEY"
base_url = "https://xdts-dev-auto6.openai.azure.com/openai"