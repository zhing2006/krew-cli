# krew-cli configuration example
# Copy this file to .krew/settings.toml and edit as needed.
#
# User-level config: ~/.krew/settings.toml
#   Supports: [settings] (preferences), [providers.*], [[mcp_servers]], [skills]
#   Does NOT support: [[agents]], reply_order (project-only)
#   Merge rules: project overrides user for same-key fields;
#                providers — same-name replaced entirely;
#                mcp_servers — same-name replaced, unique ones merged.

[settings]
approval_mode = "suggest"              # suggest | auto-edit | full-auto
reply_order = ["gpt", "opus", "sonnet", "gemini", "doubao"]
auto_compact_threshold = 120000        # auto-compact token threshold (0 = disabled)
paste_burst_detection = true           # timing-based paste detection for Windows (auto-disables if terminal supports bracketed paste)
worker_threads = 4                     # tokio worker thread count (default: 4)
agent_to_agent_routing = "immediate"   # immediate | queued — how @mentioned agents are scheduled
agent_to_agent_max_rounds = 10         # max AI-to-AI rounds per user turn (0 = disabled)
# language = "中文"                    # language for agent responses (e.g. "中文", "English", "日本語"); unset = no instruction injected
# restrict_workspace = true            # restrict file tools to workspace directory (default: true); set false to allow access to any path
# sub_agent_enabled = false            # enable sub-agent system (default: false); when true, discovers .md agent definitions and registers run_agent tool
# update_check = true                  # check npm registry for new versions on startup (default: true)

# Permission rules: deny_rules, ask_rules, allow_rules
# Each rule has: tool (required), pattern (optional), reason (optional)
# Pattern syntax: shell = wildcard (*), file tools = glob (**/*), fetch_url = domain suffix
# Rules are evaluated in order: deny → ask → allow
#
# [[deny_rules]]
# tool = "shell"
# pattern = "rm -rf *"
# reason = "Recursive force deletion is not allowed"
#
# [[ask_rules]]
# tool = "shell"
# pattern = "npm publish *"
# reason = "Publishing requires confirmation"
#
# [[allow_rules]]
# tool = "shell"
# pattern = "cargo *"
#
# [[allow_rules]]
# tool = "fetch_url"
# pattern = "github.com"
#
# [[allow_rules]]
# tool = "read_file"

# Agent definitions

[[agents]]
name = "gpt"
display_name = "GPT-5.2"
provider = "openai"
model = "gpt-5.2"
api_type = "responses"
color = "green"
system_prompt = ""
tools = true
enable_web_search = false
# sampling.temperature = 0.7
# sampling.max_tokens = 32768

[[agents]]
name = "opus"
display_name = "Claude Opus"
provider = "anthropic"
model = "claude-opus-4-6"
color = "magenta"
system_prompt = ""
tools = true
enable_web_search = false

[[agents]]
name = "sonnet"
display_name = "Claude Sonnet"
provider = "anthropic"
model = "claude-sonnet-4-6"
color = "cyan"
system_prompt = ""
tools = true
enable_web_search = false

[[agents]]
name = "gemini"
display_name = "Gemini 3.1 Pro"
provider = "google"
model = "gemini-3.1-pro"
color = "blue"
system_prompt = ""
tools = true
enable_web_search = false

[[agents]]
name = "doubao"
display_name = "Doubao Seed 2.0"
provider = "doubao"
model = "doubao-seed-2.0-pro"
color = "yellow"
system_prompt = ""
tools = true
enable_web_search = false

# Provider SDK configuration

[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"
# base_url = "https://api.openai.com"     # default, can omit
# For Azure OpenAI: base_url = "https://YOUR-RESOURCE.openai.azure.com/openai"

[providers.anthropic]
type = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
# base_url = "https://api.anthropic.com"  # default, can omit

[providers.google]
type = "google"
api_key_env = "GOOGLE_API_KEY"

# Google Vertex AI with Priority PayGo example:
# [providers.vertex]
# type = "google"
# vertex_project = "my-project"
# vertex_location = "global"
# extra_headers = { "X-Vertex-AI-LLM-Request-Type" = "shared", "X-Vertex-AI-LLM-Shared-Request-Type" = "priority" }

[providers.doubao]
type = "openai"                            # OpenAI-compatible service
api_key_env = "DOUBAO_API_KEY"
base_url = "https://ark.cn-beijing.volces.com/api/v3"

# Agent Skills configuration
# Skills are discovered from .krew/skills/ and .agents/skills/ directories.
# [skills]
# enabled = true                           # enable/disable skills feature (default: true)
# extra_paths = ["/path/to/shared/skills"] # additional skill scan paths

# MCP servers
[[mcp_servers]]
name = "context7"
command = "cmd"
args = ["/c", "npx", "-y", "@upstash/context7-mcp", "--api-key", "ctx7sk-your-api-key"]

[[mcp_servers]]
name = "firecrawl"
url = "https://mcp.firecrawl.dev/v2/mcp"
[mcp_servers.headers]
Authorization = "Bearer fc-your-api-key"
