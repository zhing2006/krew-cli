# Windows: static_vcruntime crate handles static linking (via krew-cli build.rs)
# The +crt-static flag is also needed; static_vcruntime overrides UCRT back to dynamic.
# Linux musl: cargo build --target x86_64-unknown-linux-musl
# macOS: crt-static via RUSTFLAGS

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-feature=+crt-static"]
